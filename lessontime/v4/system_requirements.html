<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>レッスンタイム 推奨環境について</title>
  <meta name="description" content="レッスンタイム推奨環境について">
  <meta name="author" content="東音企画">

  <style>
    .border-bottom-1-red {
      border-bottom: 1px solid #660000
    }

    th, td {
      border: solid 1px;
      padding: 10px;
    }
    table {
      border-collapse: collapse;
      width: 95%;
      margin: 20px;
    }

    .term a,
    .term a:visited {
      color: blue;
      text-decoration: none;
    }
    .term a:hover {
      text-decoration: underline;
    }
    .term h3 {
      border: 0;
      font-weight: normal;
      margin: 0;
      padding: 0;
    }
    .term ul {
      border: 0;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .term li {
      border: 0;
      padding: 0;
    }
    .term-body {
      display: flex;
      flex-direction: column;
      font-size: 16px;
      line-height: 1.4;
      min-height: 100vh;
      max-width: 100%;
    }
    .term-font-size-1 {
      font-size: 1rem;
    }
    .term-font-size-1-1 {
      font-size: 1.1rem;
    }
    .term-font-size-1-3 {
      font-size: 1.3rem;
    }
    .term-font-size-1-5 {
      font-size: 1.5rem;
      border: 0;
      font-weight: normal;
      padding: 0;
    }
    .term-footer {
      bottom: 0;
      height: 10vh;
      margin-top: auto;
      max-width: inherit;
    }
    .term-header {
      height: 10vh;
      margin-bottom: 2rem;
      max-width: inherit;
      padding-left: 1rem;
    }
    .term-main {
      max-width: inherit;
      padding-left: 1rem;
    }
    .term-margin-bottom-1 {
      margin-top: 0;
      margin-bottom: 1rem;
    }
    .term-margin-bottom-2 {
      margin-bottom: 2rem;
    }
    .term-margin-bottom-3 {
      margin-bottom: 3rem;
    }
    .term-margin-left-1 {
      margin-left: 1rem;
    }
    .term-right {
      text-align: right;
    }
    .term-text-center {
      text-align: center;
    }
  </style>

</head>
<body class="term-body">
  <header class="term-header">
    <div class="border-bottom-1-red">
      <h1 class="term-font-size-1-5">推奨環境について</h1>
    </div>
    <p class="term-right">最終更新日：2026年3月9日</p>
  </header>
  <main class="term-main">
    <div class="container">
      <div class="row header">
        <p>レッスンタイムをご利用いただく際は以下の環境でご利用ください。</p>
      </div>
      <div class="row">
        <div class="col-md-12">
          <div class="messages">
            <h3>1. スマートフォン</h3>
            <table>
              <thead>
                <tr>
                  <th>プラットフォーム</th>
                  <th>対応バージョン</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>iOS</td>
                  <td>iOS 16.0 以上</td>
                </tr>
                <tr>
                  <td>Android</td>
                  <td>Android 11 以上</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="messages">
            <h3>2. PC（デスクトップ）</h3>
            <table>
              <thead>
                <tr>
                  <th>プラットフォーム</th>
                  <th>対応バージョン</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Windows</td>
                  <td>Windows 10 以上</td>
                </tr>

              </tbody>
            </table>
          </div>
          <div class="messages">
            <h3>3. Webブラウザ（PWA対応）</h3>
            <table>
              <thead>
                <tr>
                  <th>ブラウザ</th>
                  <th>対応バージョン</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Google Chrome</td>
                  <td>最新版を推奨</td>
                </tr>
                <tr>
                  <td>Safari</td>
                  <td>最新版を推奨</td>
                </tr>
                <tr>
                  <td>Microsoft Edge</td>
                  <td>最新版を推奨</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="term-footer">
    <div class="term term-text-center term-font-size-1">
      <p><a href="https://to-on.com/">株式会社 東音企画</a></p>
    </div>
  </footer>
</body>
</html>
